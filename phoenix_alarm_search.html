<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PHOENIX Alarm Search · Vantive</title>
<style>
:root{
  --nav-h:64px;
  --plum:#72256B;--plum-d:#5C1B56;--plum-light:rgba(114,37,107,0.09);
  --cream:#FFFAEB;
  --pine:#105742;--pine-light:rgba(16,87,66,0.10);
  --euca:#6CA07A;--euca-light:rgba(108,160,122,0.12);
  --amber:#D4700A;--amber-light:rgba(212,112,10,0.10);
  --danger:#C0392B;--danger-light:rgba(192,57,43,0.10);
  --blue:#1A5276;--blue-light:rgba(26,82,118,0.10);
  --teal:#0D7377;--teal-light:rgba(13,115,119,0.10);
  --slate:#5D6D7E;--slate-light:rgba(93,109,126,0.10);
  --rose:#C0392B;--rose-light:rgba(192,57,43,0.07);
  --white:#FFFFFF;--text:#1C1C1E;--text2:#52525B;--text3:#A1A1AA;
  --border:rgba(0,0,0,0.07);--border-p:rgba(114,37,107,0.14);
  --shadow:0 2px 14px rgba(0,0,0,0.06);--r:14px;--r-xs:5px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  background:var(--cream);color:var(--text);font-size:14px;min-height:100vh;
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,0px),10px));}

/* ── Header ── */
.hdr{background:linear-gradient(150deg,var(--plum-d) 0%,var(--plum) 60%,#8B3080 100%);
  padding:calc(16px + env(safe-area-inset-top,0px)) 18px 0;
  position:sticky;top:0;z-index:200;overflow:hidden;}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;position:relative;z-index:2;}
.wmark-wrap{display:flex;flex-direction:column;gap:4px;}
.tagline{font-size:13.5px;font-weight:700;color:rgba(255,250,235,0.55);letter-spacing:1.8px;text-transform:uppercase;}
.total-badge{background:rgba(255,250,235,0.18);border:1px solid rgba(255,250,235,0.25);
  color:var(--cream);font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;flex-shrink:0;margin-top:2px;}
.s-wrap{position:relative;margin-bottom:10px;z-index:2;}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;}
.s-inp{width:100%;padding:12px 42px 12px 44px;background:rgba(255,250,235,0.13);
  border:1.5px solid rgba(255,250,235,0.22);border-radius:12px;font-size:14px;
  color:var(--cream);outline:none;font-family:inherit;transition:background .18s,border-color .18s;}
.s-inp:focus{background:rgba(255,250,235,0.22);border-color:rgba(255,250,235,0.45);}
.s-inp::placeholder{color:rgba(255,250,235,0.45);}
.s-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:rgba(255,250,235,0.22);border:none;border-radius:50%;
  width:22px;height:22px;font-size:12px;cursor:pointer;color:var(--cream);
  font-weight:700;display:none;line-height:22px;text-align:center;}
.s-clr.show{display:block;}
.s-hint{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-bottom:12px;
  font-size:11px;color:rgba(255,250,235,0.58);position:relative;z-index:2;}
.h-ex{background:rgba(255,250,235,0.14);border:1px solid rgba(255,250,235,0.18);
  color:rgba(255,250,235,0.9);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;}

/* ── Filters ── */
.filt{background:var(--cream);padding:12px 18px;border-bottom:1px solid var(--border);}
.flbl{font-size:9.5px;font-weight:800;color:var(--pine);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:7px;}
.seg-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.seg-row::-webkit-scrollbar{display:none;}
.seg{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;user-select:none;white-space:nowrap;background:rgba(0,0,0,0.05);color:var(--text2);
  border:1.5px solid transparent;transition:all .15s ease;font-family:inherit;display:inline-flex;align-items:center;}
.seg.on{background:var(--plum);color:var(--cream);border-color:var(--plum);}
.seg:active{transform:scale(0.95);}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;flex-shrink:0;}
.frow{margin-bottom:10px;}.frow:last-child{margin-bottom:0;}

/* ── Status bar ── */
.sbar{padding:8px 18px 6px;font-size:12px;color:var(--text2);background:var(--cream);}
.sbar b{color:var(--plum);font-weight:700;}

/* ── Cards ── */
.cards{padding:8px 14px 32px;display:flex;flex-direction:column;gap:9px;}
.card{background:var(--white);border-radius:var(--r);
  box-shadow:0 2px 14px rgba(0,0,0,0.06);border:1px solid var(--border);overflow:hidden;}
.chead{display:flex;align-items:flex-start;gap:10px;padding:13px 13px 11px;cursor:pointer;}
.abadge{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:3px 7px;
  border-radius:var(--r-xs);font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;
  margin-top:2px;font-family:monospace;background:var(--plum-light);color:var(--plum);border:1px solid var(--border-p);}

/* Class badges */
.cbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.cls-p  {background:var(--danger-light);color:var(--danger);}
.cls-pd {background:rgba(192,57,43,0.07);color:#A93226;border:1px solid rgba(192,57,43,0.15);}
.cls-a  {background:var(--amber-light);color:var(--amber);}
.cls-b  {background:var(--plum-light);color:var(--plum);}
.cls-c  {background:rgba(180,100,0,0.10);color:#874D00;}
.cls-d  {background:var(--blue-light);color:var(--blue);}
.cls-e  {background:var(--slate-light);color:var(--slate);}
.cls-w  {background:var(--pine-light);color:var(--pine);}
.cls-sp {background:rgba(0,0,0,0.05);color:var(--text3);}

/* Override badges */
.obadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.ovr-yes  {background:var(--pine-light);color:var(--pine);}
.ovr-yesr {background:var(--amber-light);color:var(--amber);}
.ovr-no   {background:rgba(0,0,0,0.05);color:var(--text3);}
.ovr-cond {background:var(--teal-light);color:var(--teal);}

/* Attribute tags */
.attr-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.attr-tag{background:var(--euca-light);color:var(--pine);border:1px solid rgba(108,160,122,0.2);
  border-radius:4px;font-size:10px;font-weight:600;padding:1px 6px;}

.cbody{flex:1;min-width:0;}
.ctitle{font-size:13.5px;font-weight:700;line-height:1.45;margin-bottom:6px;color:var(--text);}
.cmeta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.chev{color:var(--text3);flex-shrink:0;margin-top:2px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.04);border-radius:50%;
  transition:transform .25s ease,background .15s,color .15s;}
.chev.open{transform:rotate(180deg);background:var(--plum-light);color:var(--plum);}
.cdet{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.cdet.open{max-height:3000px;border-top:1px solid var(--border);}
.cdet-in{padding:15px 13px 18px;background:rgba(255,250,235,0.5);}
.dsec{margin-bottom:13px;}.dsec:last-child{margin-bottom:0;}
.dlbl{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:800;color:var(--pine);
  text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;}
.dbox,.abox,.sbox{font-size:13.5px;line-height:1.75;border-radius:10px;padding:11px 13px;}
.dbox{color:var(--text);background:var(--white);border:1px solid var(--border);}
.abox{color:#7a4800;background:var(--amber-light);border:1px solid rgba(212,112,10,0.2);}
.sbox{color:var(--pine);font-weight:500;background:var(--euca-light);border:1px solid rgba(108,160,122,0.25);}
.dbox ul,.abox ul,.sbox ul{list-style:none;padding:0;}
.dbox li,.abox li,.sbox li{padding:2px 0 2px 14px;position:relative;}
.dbox li::before,.abox li::before,.sbox li::before{content:"·";position:absolute;left:4px;color:var(--text3);}
mark{background:rgba(114,37,107,0.13);color:var(--plum);border-radius:2px;padding:0 1px;}
.empty{text-align:center;padding:60px 24px;color:var(--text2);display:none;}
.empty-ico{font-size:46px;margin-bottom:12px;opacity:.4;}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty p{font-size:13px;}

/* ── Bottom Navigation ── */
.bnav{position:fixed;bottom:0;left:0;right:0;min-height:var(--nav-h);
  background:#B5CFBC;border-top:1.5px solid rgba(114,37,107,0.18);
  display:flex;align-items:flex-start;padding-top:10px;
  padding-bottom:max(env(safe-area-inset-bottom,0px),10px);z-index:200;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:3px 4px;cursor:pointer;border:none;background:none;
  font-family:inherit;-webkit-tap-highlight-color:transparent;}
.bnav-svg{width:24px;height:24px;color:rgba(114,37,107,0.4);
  transition:color .15s,transform .18s cubic-bezier(.34,1.56,.64,1);}
.bnav-label{font-size:10px;font-weight:600;color:rgba(114,37,107,0.5);font-family:inherit;}
.bnav-item.on .bnav-svg{color:var(--plum);transform:scale(1.12);}
.bnav-item.on .bnav-label{color:var(--plum);font-weight:800;}
.bnav-item:active .bnav-svg{transform:scale(0.88);}

/* ── Tab Panels ── */
.tab-panel{display:none;}
.tab-panel.on{display:block;}

/* ── Alarm Code List ── */
.alarm-panel-inner{padding:0 12px;}
.ag{margin-bottom:18px;}
.ag-header{display:flex;align-items:center;gap:8px;margin:14px 0 6px;}
.ag-cnt{font-size:11px;color:var(--text3);font-weight:600;}
.ag-list{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;}
.ag-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;gap:8px;
  border-bottom:1px solid var(--border);transition:background .12s;}
.ag-row:last-child{border-bottom:none;}
.ag-row:active{background:var(--plum-light);}
.ag-code{font-size:12px;font-weight:700;color:var(--plum);font-family:monospace;min-width:40px;}
.ag-name{font-size:12px;color:var(--text);flex:1;}
.ag-arr{font-size:16px;color:var(--text3);}

/* ── Class Guide ── */
.guide-panel-inner{padding:12px;}
.guide-card{background:var(--white);border-radius:var(--r);
  box-shadow:var(--shadow);border:1px solid var(--border);
  overflow:hidden;margin-bottom:10px;}
.guide-head{padding:14px 16px;display:flex;align-items:center;gap:12px;}
.guide-cls-badge{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
.guide-title{font-size:14px;font-weight:700;color:var(--text);}
.guide-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.guide-body{padding:0 16px 14px;font-size:13px;color:var(--text2);line-height:1.65;}

/* ── Troubleshooting Detail Sections ── */
.ts-sec{margin-bottom:14px;}
.ts-sec:last-child{margin-bottom:0;}
.ts-lbl{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:800;
  letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px;}
.ts-lbl.lbl-reason{color:var(--plum);}
.ts-lbl.lbl-machine{color:var(--blue);}
.ts-lbl.lbl-op{color:var(--amber);}
.ts-lbl.lbl-sv{color:var(--pine);}
.ts-reason{font-size:13px;line-height:1.7;color:var(--text);
  background:var(--white);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;}
.ts-machine{font-size:13px;line-height:1.7;color:var(--blue);
  background:var(--blue-light);border:1px solid rgba(26,82,118,0.18);
  border-radius:10px;padding:11px 13px;}
.ts-table{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--white);}
.ts-thead{display:grid;grid-template-columns:1fr 1fr;
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.ts-thead .ts-th-op{padding:7px 11px;background:rgba(212,112,10,0.12);color:var(--amber);
  border-right:1px solid var(--border);}
.ts-thead .ts-th-sv{padding:7px 11px;background:rgba(16,87,66,0.10);color:var(--pine);}
.ts-pairs{display:flex;flex-direction:column;}
.ts-pair{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);}
.ts-pair:first-child{border-top:1px solid var(--border);}
.ts-cause{padding:9px 11px;font-size:12px;line-height:1.6;color:#7a4800;
  background:rgba(212,112,10,0.05);border-right:1px solid var(--border);}
.ts-action{padding:9px 11px;font-size:12px;line-height:1.6;color:var(--pine);
  background:rgba(16,87,66,0.04);}
.ts-num{display:inline-block;min-width:16px;font-size:10px;font-weight:800;
  color:var(--text3);margin-right:4px;}
.ts-no-data{font-size:12px;color:var(--text3);font-style:italic;padding:8px 11px;}

.ts-pair-header{display:grid;grid-template-columns:1fr 1fr;margin-bottom:5px;gap:0;}
.ts-cause-sv{background:rgba(16,87,66,0.06)!important;color:var(--pine)!important;border-left:1px solid var(--border)!important;border-right:none!important;}
.ts-pair-action{background:rgba(255,255,255,0.8);}
.ts-action-op{font-style:italic;color:var(--amber)!important;font-size:11.5px!important;}
.ts-action-sv{font-style:italic;color:var(--pine)!important;font-size:11.5px!important;border-left:1px solid var(--border);}
.ts-th-sv{padding:7px 11px;background:rgba(16,87,66,0.10);color:var(--pine);}
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="hdr">
  <div class="hdr-top">
    <div class="wmark-wrap">
      <span class="tagline">PHOENIX · Service Manual</span>
      <span style="font-size:18px;font-weight:900;color:var(--cream);letter-spacing:0.5px;">Alarm Search</span>
    </div>
    <span class="total-badge" id="totalBadge">— alarms</span>
  </div>
  <div class="s-wrap">
    <svg class="s-ico" width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="rgba(255,250,235,0.6)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="sInp" class="s-inp" type="search"
      placeholder="Search alarm message, code, attribute…"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="s-clr" id="sClr" aria-label="Clear">✕</button>
  </div>
  <div class="s-hint">
    <span>Try:</span>
    <span class="h-ex">blood</span>
    <span class="h-ex">conductivity</span>
    <span class="h-ex">28</span>
    <span class="h-ex">pressure</span>
  </div>
</div>

<!-- ── Filters ── -->
<div class="filt" id="filtEl">
  <div class="frow">
    <div class="flbl">Class</div>
    <div class="seg-row" id="clsRow">
      <button class="seg on" data-v="all"><span class="sdot" style="background:#999;"></span>All</button>
      <button class="seg" data-v="p" ><span class="sdot" style="background:var(--danger);"></span>P — Patient</button>
      <button class="seg" data-v="pd"><span class="sdot" style="background:#A93226;"></span>Pd — Data Err</button>
      <button class="seg" data-v="a" ><span class="sdot" style="background:var(--amber);"></span>A — Attention</button>
      <button class="seg" data-v="b" ><span class="sdot" style="background:var(--plum);"></span>B — Bypass</button>
      <button class="seg" data-v="c" ><span class="sdot" style="background:#874D00;"></span>C — Caution</button>
      <button class="seg" data-v="d" ><span class="sdot" style="background:var(--blue);"></span>D — Device</button>
      <button class="seg" data-v="e" ><span class="sdot" style="background:var(--slate);"></span>E — Equipment</button>
      <button class="seg" data-v="w" ><span class="sdot" style="background:var(--pine);"></span>W — Warning</button>
    </div>
  </div>
  <div class="frow">
    <div class="flbl">Override</div>
    <div class="seg-row" id="ovrRow">
      <button class="seg on" data-v="all">All</button>
      <button class="seg" data-v="yes">YES</button>
      <button class="seg" data-v="yes-r">YES [R] — Reset</button>
      <button class="seg" data-v="no">NO</button>
    </div>
  </div>
</div>

<!-- ── Status bar ── -->
<div class="sbar" id="sbarEl">Showing all alarms</div>

<!-- ── Cards ── -->
<div class="cards" id="cardsEl"></div>
<div class="empty" id="emptyEl">
  <div class="empty-ico">🔍</div>
  <h3>No alarms found</h3>
  <p>Try a different search term or clear the filters.</p>
</div>

<!-- ── Alarm Code List Tab ── -->
<div class="tab-panel" id="alarmPanel">
  <div class="alarm-panel-inner" id="alarmPanelInner"></div>
</div>

<!-- ── Class Guide Tab ── -->
<div class="tab-panel" id="guidePanel">
  <div class="guide-panel-inner" id="guidePanelInner"></div>
</div>

<!-- ── Bottom Navigation ── -->
<nav class="bnav">
  <button class="bnav-item on" onclick="switchBnav('search',this)">
    <svg class="bnav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <span class="bnav-label">Search</span>
  </button>
  <button class="bnav-item" onclick="switchBnav('alarm',this)">
    <svg class="bnav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="bnav-label">By Class</span>
  </button>
  <button class="bnav-item" onclick="switchBnav('guide',this)">
    <svg class="bnav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span class="bnav-label">Class Guide</span>
  </button>
</nav>

<script>

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hi(s,ws){
  if(!ws||!ws.length) return esc(s);
  var r=esc(s);
  ws.forEach(function(w){
    if(!w) return;
    r=r.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
  });
  return r;
}

/* ════════════════════════════════════════════
   RENDER CARDS
   ════════════════════════════════════════════ */
function render(list){
  var ws = SQ ? SQ.trim().toLowerCase().split(/\s+/) : [];
  var cards = document.getElementById('cardsEl');
  var empty = document.getElementById('emptyEl');
  var sbar  = document.getElementById('sbarEl');

  if(!list.length){
    cards.innerHTML=''; cards.style.display='none'; empty.style.display='block';
    sbar.innerHTML='No results found';
    return;
  }
  cards.style.display=''; empty.style.display='none';

  if(SQ||CF!=='all'||OF!=='all'){
    sbar.innerHTML='Showing <b>'+list.length+'</b> of '+ALARMS.length+' alarms';
  } else {
    sbar.innerHTML='Showing all <b>'+ALARMS.length+'</b> alarms';
  }

  cards.innerHTML = list.map(function(a){
    var key = 'a'+a.code;
    var isOpen = OS[key];
    var ci = CLASS_INFO[a.cls] || CLASS_INFO['sp'];
    var oi = OVR_INFO[a.ovr]   || OVR_INFO['no'];
    var attrTags = a.attr ? a.attr.split('/').map(function(t){
      return '<span class="attr-tag">'+esc(t.trim())+'</span>';
    }).join('') : '';

    var ts = TS[a.code] || null;
    var tsHtml = '';
    if(ts){
      if(ts.r){
        tsHtml += '<div class="ts-sec">'+
          '<div class="ts-lbl lbl-reason">\u26a1 Reason for Alarm</div>'+
          '<div class="ts-reason">'+esc(ts.r)+'</div>'+
        '</div>';
      }
      if(ts.m){
        tsHtml += '<div class="ts-sec">'+
          '<div class="ts-lbl lbl-machine">\u2699 Machine Actions</div>'+
          '<div class="ts-machine">'+esc(ts.m)+'</div>'+
        '</div>';
      }
      var maxP = Math.max(ts.oc.length, ts.oa.length, ts.sc.length, ts.sa.length);
      if(maxP > 0){
        var pairRows = '';
        for(var pi=0; pi<maxP; pi++){
          var ocTxt = pi<ts.oc.length ? '<span class="ts-num">'+(pi+1)+'.</span>'+esc(ts.oc[pi]) : '';
          var oaTxt = pi<ts.oa.length ? '\u2192 <span class="ts-num">'+(pi+1)+'.</span>'+esc(ts.oa[pi]) : '';
          var scTxt = pi<ts.sc.length ? '<span class="ts-num">'+(pi+1)+'.</span>'+esc(ts.sc[pi]) : '';
          var saTxt = pi<ts.sa.length ? '\u2192 <span class="ts-num">'+(pi+1)+'.</span>'+esc(ts.sa[pi]) : '';
          pairRows +=
            '<div class="ts-pair">'+
              '<div class="ts-cause">'+ocTxt+'</div>'+
              '<div class="ts-cause ts-cause-sv">'+scTxt+'</div>'+
            '</div>'+
            '<div class="ts-pair ts-pair-action">'+
              '<div class="ts-action ts-action-op">'+oaTxt+'</div>'+
              '<div class="ts-action ts-action-sv">'+saTxt+'</div>'+
            '</div>';
        }
        tsHtml += '<div class="ts-sec">'+
          '<div class="ts-pair-header">'+
            '<div class="ts-lbl lbl-op" style="margin-bottom:0">\ud83d\udc64 Operator (Cause \u2192 Action)</div>'+
            '<div class="ts-lbl lbl-sv" style="margin-bottom:0">\ud83d\udd27 Service (Cause \u2192 Action)</div>'+
          '</div>'+
          '<div class="ts-table">'+
            '<div class="ts-thead">'+
              '<div class="ts-th-op">Cause</div>'+
              '<div class="ts-th-sv">Cause</div>'+
            '</div>'+
            '<div class="ts-pairs">'+pairRows+'</div>'+
          '</div>'+
        '</div>';
      }
    }
    return '<div class="card">'+
      '<div class="chead" onclick="toggle(\''+key+'\')">'+
        '<span class="abadge">'+esc(a.code)+'</span>'+
        '<div class="cbody">'+
          '<div class="ctitle">'+hi(a.msg,ws)+'</div>'+
          '<div class="cmeta">'+
            '<span class="cbadge '+ci.css+'">'+esc(ci.label)+'</span>'+
            '<span class="obadge '+oi.css+'">'+esc(oi.label)+'</span>'+
          '</div>'+
          (attrTags ? '<div class="attr-tags">'+attrTags+'</div>' : '')+
        '</div>'+
        '<div class="chev'+(isOpen?' open':'')+'\" id="chev_'+key+'">&#9662;</div>'+
      '</div>'+
      '<div class="cdet'+(isOpen?' open':'')+'\" id="det_'+key+'">'+
        '<div class="cdet-in">'+
          '<div class="dsec">'+
            '<div class="dlbl">&#9658; Alarm Class</div>'+
            '<div class="dbox">'+
              '<strong>'+esc(ci.label)+'</strong><br>'+esc(ci.desc)+
            '</div>'+
          '</div>'+
          (a.attr ? '<div class="dsec"><div class="dlbl">&#9658; Attribute / Sub-type</div><div class="sbox">'+hi(a.attr,ws)+'</div></div>' : '')+
          '<div class="dsec">'+
            '<div class="dlbl">&#9658; Override</div>'+
            '<div class="abox"><strong>'+esc(oi.label)+'</strong> &mdash; '+esc(oi.desc)+'</div>'+
          '</div>'+
          tsHtml+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

}

function toggle(key){
  var det  = document.getElementById('det_'+key);
  var chev = document.getElementById('chev_'+key);
  if(!det) return;
  if(OS[key]){OS[key]=0;det.classList.remove('open');if(chev)chev.classList.remove('open');}
  else{OS[key]=1;det.classList.add('open');if(chev)chev.classList.add('open');}
}

/* ════════════════════════════════════════════
   SEARCH + FILTER
   ════════════════════════════════════════════ */
function go(){
  var ws = SQ ? SQ.trim().toLowerCase().split(/\s+/) : [];
  var list = ALARMS.slice();
  if(CF !== 'all') list = list.filter(function(a){ return a.cls === CF; });
  if(OF !== 'all'){
    if(OF==='yes')   list = list.filter(function(a){ return a.ovr==='yes'||a.ovr==='cond'; });
    else if(OF==='yes-r') list = list.filter(function(a){ return a.ovr==='yes-r'; });
    else if(OF==='no')    list = list.filter(function(a){ return a.ovr==='no'||a.ovr==='sp'; });
  }
  if(ws.length) list = list.filter(function(a){
    var h = [String(a.code), a.msg, a.attr, a.cls].join(' ').toLowerCase();
    return ws.every(function(w){ return h.indexOf(w)>=0; });
  });
  list.sort(function(a,b){ return a.code - b.code; });
  OS={};
  render(list);
}

function renderAlarmPanel(){
  var order = ['p','pd','a','b','c','d','e','w','sp'];
  var html = '';
  order.forEach(function(cls){
    var rows = ALARMS.filter(function(a){ return a.cls===cls; });
    if(!rows.length) return;
    var ci = CLASS_INFO[cls];
    html += '<div class="ag">'+
      '<div class="ag-header">'+
        '<span class="cbadge '+ci.css+'">'+esc(ci.label)+'</span>'+
        '<span class="ag-cnt">'+rows.length+' alarms</span>'+
      '</div>'+
      '<div class="ag-list">';
    rows.forEach(function(a){
      html += '<div class="ag-row" onclick="jumpTo(\'a'+a.code+'\')">'+
        '<span class="ag-code">'+esc(a.code)+'</span>'+
        '<span class="ag-name">'+esc(a.msg)+'</span>'+
        '<span class="ag-arr">›</span>'+
      '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('alarmPanelInner').innerHTML = html;
}

function jumpTo(key){
  switchBnav('search', document.querySelector('.bnav-item'));
  setTimeout(function(){
    OS[key]=1; go();
    setTimeout(function(){
      var el=document.getElementById('det_'+key);
      if(el) el.closest('.card').scrollIntoView({behavior:'smooth',block:'center'});
    },350);
  },80);
}

  /* Notes */
  html += '<div style="background:var(--white);border-radius:var(--r);padding:16px;border:1px solid var(--border);margin-top:4px;">'+
    '<div style="font-size:11px;font-weight:800;color:var(--pine);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">📋 Notes</div>'+
    '<div style="font-size:13px;color:var(--text2);line-height:1.7;">'+
      '<b>Note 1</b> — MINIMUM TRANSMEMBRANE PRESSURE (Code 142): If TMP parameter is set to NO in CONFIG menu, alarm cannot be overridden; if set to YES, alarm can be reset.<br><br>'+
      '<b>Note 2</b> — VENOUS PRESSURE HIGH LIMIT (Code 154): OVERRIDE only has effect if measured venous pressure is less than +450 mmHg, otherwise safety activation is not removed.<br><br>'+
      '<b>Note 3</b> — W! CONTINUE DESPITE T1 FAILURE (Code 188): To RESET the alarm condition, press the <strong>OVERRIDE</strong> button then press the <strong>CONFIRM</strong> button.'+
    '</div>'+
  '</div>';
  document.getElementById('guidePanelInner').innerHTML = html;
}

/* ════════════════════════════════════════════
   TAB SWITCH
   ════════════════════════════════════════════ */
function switchBnav(tab, el){
  document.querySelectorAll('.bnav-item').forEach(function(b){b.classList.remove('on');});
  if(el) el.classList.add('on');

  var isSearch = (tab==='search');
  var filtEl   = document.getElementById('filtEl');
  var sbarEl   = document.getElementById('sbarEl');
  var cardsEl  = document.getElementById('cardsEl');
  var emptyEl  = document.getElementById('emptyEl');

  filtEl.style.display  = isSearch ? '' : 'none';
  sbarEl.style.display  = isSearch ? '' : 'none';
  cardsEl.style.display = isSearch ? '' : 'none';
  emptyEl.style.display = 'none';

  document.getElementById('alarmPanel').classList.toggle('on', tab==='alarm');
  document.getElementById('guidePanel').classList.toggle('on', tab==='guide');

  if(tab==='alarm')  renderAlarmPanel();
  if(tab==='guide')  renderGuidePanel();
  if(tab==='search'){ cardsEl.style.display=''; go(); }
}

/* ════ INIT ════ */
go();
</script>
