<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Spare Parts Price List 2026 v3 · Vantive</title>
<style>
:root{--nav-h:64px;--plum:#72256B;--plum-d:#5C1B56;--plum-light:rgba(114,37,107,0.09);
--cream:#FFFAEB;--pine:#105742;--pine-light:rgba(16,87,66,0.10);
--euca:#6CA07A;--euca-light:rgba(108,160,122,0.12);
--amber:#D4700A;--amber-light:rgba(212,112,10,0.10);
--danger:#C0392B;--danger-light:rgba(192,57,43,0.10);
--teal:#0A7A8F;--teal-light:rgba(10,122,143,0.10);
--indigo:#3B4DC8;--indigo-light:rgba(59,77,200,0.10);
--white:#FFFFFF;--text:#1C1C1E;--text2:#52525B;--text3:#A1A1AA;
--border:rgba(0,0,0,0.07);--border-p:rgba(114,37,107,0.14);
--r:14px;--r-xs:5px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
background:var(--cream);color:var(--text);font-size:14px;min-height:100vh;
-webkit-font-smoothing:antialiased;
padding-bottom:calc(var(--nav-h) + max(env(safe-area-inset-bottom,0px),10px));}
.hdr{background:linear-gradient(150deg,var(--plum-d) 0%,var(--plum) 60%,#8B3080 100%);
padding:calc(16px + env(safe-area-inset-top,0px)) 18px 0;position:sticky;top:0;z-index:200;overflow:hidden;}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;position:relative;z-index:2;}
.wmark-wrap{display:flex;flex-direction:column;gap:4px;}
.wmark-img{height:26px;width:auto;max-width:100px;display:block;}
.tagline{font-size:13.5px;font-weight:700;color:rgba(255,250,235,0.55);letter-spacing:1.8px;text-transform:uppercase;}
.total-badge{background:rgba(255,250,235,0.18);border:1px solid rgba(255,250,235,0.25);
color:var(--cream);font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;flex-shrink:0;margin-top:2px;}
.s-wrap{position:relative;margin-bottom:10px;z-index:2;}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;}
.s-inp{width:100%;padding:12px 42px 12px 44px;background:rgba(255,250,235,0.13);
border:1.5px solid rgba(255,250,235,0.22);border-radius:12px;font-size:14px;color:var(--cream);
outline:none;font-family:inherit;transition:background .18s,border-color .18s;}
.s-inp:focus{background:rgba(255,250,235,0.22);border-color:rgba(255,250,235,0.45);}
.s-inp::placeholder{color:rgba(255,250,235,0.45);}
.s-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);
background:rgba(255,250,235,0.22);border:none;border-radius:50%;
width:22px;height:22px;font-size:12px;cursor:pointer;color:var(--cream);
font-weight:700;display:none;line-height:22px;text-align:center;}
.s-clr.show{display:block;}
.s-hint{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-bottom:12px;
font-size:11px;color:rgba(255,250,235,0.58);position:relative;z-index:2;}
.h-arr{color:rgba(255,250,235,0.75);font-weight:800;letter-spacing:-1px;}
.h-ex{background:rgba(255,250,235,0.14);border:1px solid rgba(255,250,235,0.18);
color:rgba(255,250,235,0.9);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;}
.filt{background:var(--cream);padding:12px 18px;border-bottom:1px solid var(--border);}
.flbl{font-size:9.5px;font-weight:800;color:var(--pine);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:7px;}
.seg-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.seg-row::-webkit-scrollbar{display:none;}
.seg{flex-shrink:0;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
cursor:pointer;user-select:none;white-space:nowrap;background:rgba(0,0,0,0.05);color:var(--text2);
border:1.5px solid transparent;transition:all .15s ease;font-family:inherit;display:inline-flex;align-items:center;}
.seg.on{background:var(--plum);color:var(--cream);border-color:var(--plum);}
.seg:active{transform:scale(0.95);}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;flex-shrink:0;}
.frow{margin-bottom:10px;}.frow:last-child{margin-bottom:0;}
.sbar{padding:8px 18px 6px;font-size:12px;color:var(--text2);background:var(--cream);}
.sbar b{color:var(--plum);font-weight:700;}
.cards{padding:8px 14px 32px;display:flex;flex-direction:column;gap:9px;}
.card{background:var(--white);border-radius:var(--r);box-shadow:0 2px 14px rgba(0,0,0,0.06);
border:1px solid var(--border);overflow:hidden;}
.chead{display:flex;align-items:flex-start;gap:10px;padding:13px 13px 11px;cursor:pointer;}
.icode{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:3px 7px;
border-radius:var(--r-xs);font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;margin-top:2px;
font-family:monospace;background:var(--plum-light);color:var(--plum);border:1px solid var(--border-p);}
.cbody{flex:1;min-width:0;}
.ctitle{font-size:13.5px;font-weight:700;line-height:1.45;margin-bottom:6px;color:var(--text);}
.cmeta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.chev{color:var(--text3);flex-shrink:0;margin-top:2px;width:22px;height:22px;
display:flex;align-items:center;justify-content:center;
background:rgba(0,0,0,0.04);border-radius:50%;transition:transform .25s ease,background .15s,color .15s;}
.chev.open{transform:rotate(180deg);background:var(--plum-light);color:var(--plum);}
.cdet{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.cdet.open{max-height:400px;border-top:1px solid var(--border);}
.cdet-in{padding:15px 13px 18px;background:rgba(255,250,235,0.5);}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.price-row:last-child{border-bottom:none;}
.price-lbl{font-size:12px;color:var(--text2);}
.price-val{font-size:15px;font-weight:800;color:var(--plum);font-family:monospace;}
.price-val.incl{color:var(--pine);}
.gbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.g-artis{background:var(--plum-light);color:var(--plum);}
.g-ak{background:var(--indigo-light);color:var(--indigo);}
.g-px{background:var(--euca-light);color:var(--pine);}
.g-pf{background:rgba(114,37,107,0.06);color:#8B3080;}
.g-apd{background:var(--amber-light);color:var(--amber);}
.g-cwp{background:var(--teal-light);color:var(--teal);}
.g-wro{background:rgba(10,122,143,0.06);color:var(--teal);}
.g-pc{background:var(--euca-light);color:var(--pine);}
.g-mars{background:var(--danger-light);color:var(--danger);}
.price-badge{font-size:12px;font-weight:700;color:var(--plum);white-space:nowrap;
flex-shrink:0;margin-top:3px;font-family:monospace;padding:2px 6px;
background:var(--plum-light);border-radius:4px;}
mark{background:rgba(114,37,107,0.13);color:var(--plum);border-radius:2px;padding:0 1px;}
.empty{text-align:center;padding:60px 24px;color:var(--text2);display:none;}
.empty-ico{font-size:46px;margin-bottom:12px;opacity:.4;}
.empty h3{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty p{font-size:13px;}
.notice-bar{background:rgba(16,87,66,0.08);border-bottom:1px solid rgba(16,87,66,0.15);
padding:7px 18px;font-size:11px;color:var(--pine);display:flex;align-items:center;gap:6px;
position:sticky;top:var(--hdr-h, 120px);z-index:150;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.bnav{position:fixed;bottom:0;left:0;right:0;min-height:var(--nav-h);
background:#B5CFBC;border-top:1.5px solid rgba(114,37,107,0.18);
display:flex;align-items:flex-start;padding-top:10px;
padding-bottom:max(env(safe-area-inset-bottom,0px),10px);z-index:200;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
padding:3px 4px;cursor:pointer;border:none;background:none;
font-family:inherit;-webkit-tap-highlight-color:transparent;}
.bnav-svg{width:22px;height:22px;color:rgba(114,37,107,0.4);
transition:color .15s,transform .18s cubic-bezier(.34,1.56,.64,1);}
.bnav-label{font-size:9px;font-weight:800;color:rgba(114,37,107,0.5);font-family:'Arial Black','Arial',sans-serif;letter-spacing:.4px;text-transform:uppercase;}
.bnav-item.on .bnav-svg{color:var(--plum);transform:scale(1.12);}
.bnav-item.on .bnav-label{color:var(--plum);font-weight:800;font-family:'Arial Black','Arial',sans-serif;}
.bnav-item:active .bnav-svg{transform:scale(0.88);}
.tab-panel{display:none;padding-bottom:20px;}
.tab-panel.on{display:block;}
.bycode-panel-inner{padding:0 12px;}
.ag{margin-bottom:18px;}
.ag-header{display:flex;align-items:center;gap:8px;margin:14px 0 6px;}
.ag-cnt{font-size:11px;color:var(--text3);font-weight:600;}
.ag-list{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;}
.ag-row{display:flex;align-items:center;justify-content:space-between;
padding:10px 14px;cursor:pointer;gap:8px;border-bottom:1px solid var(--border);transition:background .12s;}
.ag-row:last-child{border-bottom:none;}
.ag-row:active{background:var(--plum-light);}
.ag-code{font-size:12px;font-weight:700;color:var(--plum);font-family:monospace;min-width:80px;}
.ag-name{font-size:12px;color:var(--text);flex:1;}
.ag-price{font-size:11px;color:var(--text3);font-family:monospace;white-space:nowrap;}
.ag-arr{font-size:16px;color:var(--text3);}
.fav-panel-inner{padding:0 12px;}
.fav-empty{text-align:center;padding:60px 24px;color:var(--text3);}
.fav-empty-icon{font-size:44px;margin-bottom:12px;opacity:.4;}
.fav-empty p{font-size:13px;line-height:1.65;}
.fav-btn{border:none;background:none;cursor:pointer;padding:4px 6px;
font-size:16px;color:var(--text3);line-height:1;
transition:color .15s,transform .18s cubic-bezier(.34,1.56,.64,1);
flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.fav-btn.active{color:#F5C518;transform:scale(1.2);}
.fav-btn:active{transform:scale(0.85);}

.fav-summary{background:linear-gradient(135deg,var(--plum) 0%,#4a1647 100%);border-radius:16px;padding:18px 20px 20px;margin:16px 0 8px;color:var(--cream);}
.fav-sum-title{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;opacity:.65;margin-bottom:14px;}
.fav-sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.fav-sum-label{font-size:13px;opacity:.75;}
.fav-sum-val{font-size:14px;font-weight:700;}
.fav-sum-divider{border:none;border-top:1px solid rgba(255,250,235,0.2);margin:12px 0;}
.fav-discount-row{display:flex;align-items:center;gap:10px;margin:12px 0 4px;}
.fav-discount-label{font-size:13px;opacity:.75;white-space:nowrap;}
.fav-discount-wrap{display:flex;align-items:center;gap:6px;flex:1;}
.fav-discount-input{width:64px;border:1.5px solid rgba(255,250,235,0.4);background:rgba(255,250,235,0.12);border-radius:8px;color:var(--cream);font-size:15px;font-weight:700;text-align:center;padding:5px 6px;outline:none;-moz-appearance:textfield;font-family:inherit;}
.fav-discount-input::-webkit-outer-spin-button,.fav-discount-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.fav-discount-input:focus{border-color:rgba(255,250,235,0.75);background:rgba(255,250,235,0.2);}
.fav-pct-symbol{font-size:15px;font-weight:700;opacity:.8;}
.fav-final-box{background:var(--pine);border-radius:12px;padding:14px 16px 14px;margin-top:14px;}.fav-final-row{display:flex;justify-content:space-between;align-items:baseline;}
.fav-final-label{font-size:13px;font-weight:700;}
.fav-final-val{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.fav-final-savings{font-size:11px;opacity:.6;text-align:right;margin-top:2px;}
.fav-clear-btn{width:100%;margin-top:10px;background:rgba(255,250,235,0.1);border:1.5px solid rgba(255,250,235,0.25);border-radius:10px;color:rgba(255,250,235,0.65);font-size:12px;font-weight:600;padding:9px;cursor:pointer;font-family:inherit;transition:all .15s;}
.fav-clear-btn:active{background:rgba(255,80,80,0.25);border-color:rgba(255,100,100,0.5);color:#ffaaaa;}
.fav-item-price{font-size:11.5px;color:var(--text3);margin-top:2px;}

.fav-memo-wrap{margin-top:12px;}
.fav-memo-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;opacity:.65;margin-bottom:7px;color:var(--cream);}
.fav-memo-textarea{width:100%;min-height:90px;border:1.5px solid rgba(255,250,235,0.3);background:rgba(255,250,235,0.1);border-radius:10px;color:var(--cream);font-size:13px;padding:10px 12px;resize:vertical;outline:none;font-family:inherit;line-height:1.6;box-sizing:border-box;}
.fav-memo-textarea::placeholder{color:rgba(255,250,235,0.35);}
.fav-memo-textarea:focus{border-color:rgba(255,250,235,0.65);background:rgba(255,250,235,0.15);}

.fav-svc-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:11px 0 11px;border-bottom:1px solid rgba(255,250,235,0.15);margin-bottom:4px;}
.fav-svc-chk-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;flex-shrink:0;}
.fav-svc-chk{appearance:none;-webkit-appearance:none;width:18px;height:18px;border:2px solid rgba(255,250,235,0.5);border-radius:5px;background:rgba(255,250,235,0.1);cursor:pointer;flex-shrink:0;position:relative;transition:all .15s;}
.fav-svc-chk:checked{background:rgba(255,250,235,0.9);border-color:rgba(255,250,235,0.9);}
.fav-svc-chk:checked::after{content:'';position:absolute;left:4px;top:1px;width:6px;height:10px;border:2px solid var(--pine);border-top:none;border-left:none;transform:rotate(40deg);}
.fav-svc-label{font-size:13px;font-weight:700;color:var(--cream);cursor:pointer;}
.fav-svc-badge{font-size:10px;background:rgba(255,250,235,0.15);border:1px solid rgba(255,250,235,0.25);border-radius:20px;padding:2px 8px;color:rgba(255,250,235,0.7);white-space:nowrap;}
.fav-svc-right{display:flex;align-items:center;gap:7px;margin-left:auto;}
.fav-svc-hour-input{width:52px;border:1.5px solid rgba(255,250,235,0.4);background:rgba(255,250,235,0.12);border-radius:8px;color:var(--cream);font-size:15px;font-weight:700;text-align:center;padding:5px 4px;outline:none;-moz-appearance:textfield;font-family:inherit;}
.fav-svc-hour-input::-webkit-outer-spin-button,.fav-svc-hour-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.fav-svc-hour-input:focus{border-color:rgba(255,250,235,0.75);background:rgba(255,250,235,0.2);}
.fav-svc-hour-input:disabled{opacity:0.35;cursor:not-allowed;}
.fav-svc-unit{font-size:12px;opacity:.7;}
.fav-svc-amt{font-size:13px;font-weight:700;white-space:nowrap;min-width:80px;text-align:right;}.fav-svc-vat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:110px;}.fav-svc-vat-excl{font-size:11px;opacity:.65;}.fav-svc-vat-incl{font-size:13px;font-weight:700;}

.fav-qty-row{display:flex;align-items:center;gap:8px;padding:0 13px 11px;border-top:1px solid rgba(0,0,0,0.05);margin-top:-2px;}
.fav-qty-label{font-size:10.5px;font-weight:600;color:var(--text3);letter-spacing:.05em;}
.fav-qty-ctrl{display:inline-flex;align-items:center;gap:4px;background:rgba(16,87,66,0.07);border-radius:20px;padding:2px 5px;}
.fav-qty-btn{background:none;border:1.5px solid rgba(16,87,66,0.3);border-radius:50%;width:22px;height:22px;color:#105742;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:background .15s;flex-shrink:0;}
.fav-qty-btn:active{background:rgba(16,87,66,0.18);}
.fav-qty-num{font-size:13px;font-weight:700;color:#105742;min-width:22px;text-align:center;}
.fav-item-subtotal{font-size:11.5px;font-weight:700;color:#105742;margin-left:auto;}
@media(max-width:500px){
  .fav-svc-right{width:100%;margin-left:0;justify-content:flex-end;padding-left:28px;}
  .fav-svc-vat{min-width:0;}
}
.fav-print-btn{width:100%;margin-top:14px;background:linear-gradient(135deg,#1a6b52 0%,#105742 100%);border:2px solid rgba(255,250,235,0.25);border-radius:12px;color:var(--cream);font-size:13.5px;font-weight:700;padding:13px 16px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:.4px;box-shadow:0 3px 10px rgba(0,0,0,0.25);}

.fav-print-btn svg{width:19px;height:19px;flex-shrink:0;}

<body>
<div class="hdr">

document.getElementById('totalBadge').textContent=ITEMS.length;

var SQ='', GF='all';

  try{return new Set(JSON.parse(localStorage.getItem('vantive26v3_favs')||'[]'));}
  catch(e){return new Set();}
})();
function saveFavs(){
  try{localStorage.setItem('vantive26v3_favs',JSON.stringify(Array.from(favs)));}
  catch(e){}
}
var favQtys=(function(){
  try{return JSON.parse(localStorage.getItem('vantive26v3_favqtys')||'{}');}
  catch(e){return {};}
})();
function saveFavQtys(){
  try{localStorage.setItem('vantive26v3_favqtys',JSON.stringify(favQtys));}
  catch(e){}
}
function getFavQty(code){return favQtys[String(code)]||1;}

function eh(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hl(txt,q){
  if(!q)return eh(txt);
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return eh(txt).replace(re,'<mark>$1</mark>');
}
function fmt(n){return Number(n).toLocaleString('ko-KR')+'원';}

function go(){
  var q=SQ.trim().toLowerCase();
  var filtered=ITEMS.filter(function(it){
    if(GF!=='all' && it.grp!==GF)return false;
    if(!q)return true;
    return String(it.code).toLowerCase().indexOf(q)>=0 ||
           String(it.desc).toLowerCase().indexOf(q)>=0;
  });
  var el=document.getElementById('cardsEl');
  var emptyEl=document.getElementById('emptyEl');
  document.getElementById('mCnt').textContent=filtered.length;
  if(!filtered.length){el.innerHTML='';emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  el.innerHTML=filtered.map(function(it){
    var isFav=favs.has(String(it.code));
    var gc=GRP_CLASS[it.grp]||'g-artis';
    var gl=GRP_LABEL[it.grp]||it.grp;
    return '<div class="card">'
      +'<div class="chead" onclick="toggle(this)">'
      +'<span class="icode">'+hl(it.code,SQ)+'</span>'
      +'<div class="cbody">'
      +'<div class="ctitle">'+hl(it.desc,SQ)+'</div>'
      +'<div class="cmeta">'
      +'<span class="gbadge '+gc+'">'+eh(gl)+'</span>'
      +'<span style="font-size:10px;color:var(--text3);margin-left:4px">SBU: '+eh(it.sbu)+'</span>'
      +'</div>'
      +'</div>'
      +'<span class="price-badge">'+fmt(it.excl)+'</span>'
      +'<button class="fav-btn'+(isFav?' active':'')+'" data-code="'+eh(it.code)+'" onclick="event.stopPropagation();toggleFav(this)">'
      +(isFav?'&#9733;':'&#9734;')
      +'</button>'
      +'<div class="chev"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter"><polyline points="6 9 12 15 18 9"/></svg></div>'
      +'</div>'
      +'<div class="cdet"><div class="cdet-in">'
      +'<div class="price-row"><span class="price-lbl">2026 Standard Price (부가세 제외, -VAT)</span><span class="price-val">'+fmt(it.excl)+'</span></div>'
      +'<div class="price-row"><span class="price-lbl">2026 Standard Price (부가세 포함, +VAT 10%)</span><span class="price-val incl">'+fmt(it.incl)+'</span></div>'
      +'</div></div>'
      +'</div>';
  }).join('');
}

function toggle(h){
  var det=h.parentElement.querySelector('.cdet');
  var chev=h.querySelector('.chev');
  var open=det.classList.toggle('open');
  chev.classList.toggle('open',open);
}

function toggleFav(btn){
  var code=btn.getAttribute('data-code');
  if(favs.has(code)){favs.delete(code);}else{favs.add(code);}
  saveFavs();
  // sync all buttons sharing same data-code
  document.querySelectorAll('[data-code]').forEach(function(b){
    if(b.classList.contains('fav-btn')&&b.getAttribute('data-code')===code){
      b.classList.toggle('active',favs.has(code));
      b.innerHTML=favs.has(code)?'&#9733;':'&#9734;';
    }
  });
  if(document.getElementById('favPanel').classList.contains('on'))renderFavs();
  // update badge
  document.getElementById('totalBadge').textContent=String(favs.size);
}

var sInp=document.getElementById('sInp');
var sClr=document.getElementById('sClr');
sInp.addEventListener('input',function(){SQ=this.value;sClr.classList.toggle('show',!!SQ);go();});
sClr.addEventListener('click',function(){sInp.value='';SQ='';sClr.classList.remove('show');sInp.focus();go();});

document.querySelectorAll('#grpRow .seg').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('#grpRow .seg').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    GF=b.getAttribute('data-v');
    go();
  });
});

function switchBnav(tab,el){
  document.querySelectorAll('.bnav-item').forEach(function(b){b.classList.remove('on');});
  if(el)el.classList.add('on');
  var isSearch=(tab==='search');
  var filt=document.querySelector('.filt');
  var sbar=document.querySelector('.sbar');
  var cards=document.getElementById('cardsEl');
  var empty=document.getElementById('emptyEl');
  if(filt)filt.style.display=isSearch?'':'none';
  if(sbar)sbar.style.display=isSearch?'':'none';
  if(cards)cards.style.display=isSearch?'':'none';
  if(empty)empty.style.display='none';
  ['bycode','fav'].forEach(function(t){
    var p=document.getElementById(t+'Panel');
    if(p)p.classList.toggle('on',tab===t);
  });
  if(tab==='bycode')renderByCode();
  if(tab==='fav')renderFavs();
}

function renderByCode(){
  var html='';
  GRP_ORDER.forEach(function(g){
    var grpItems=ITEMS.filter(function(it){return it.grp===g;});
    if(!grpItems.length)return;
    var gc=GRP_CLASS[g]||'g-artis';
    var gl=GRP_LABEL[g]||g;
    html+='<div class="ag">'
      +'<div class="ag-header"><span class="gbadge '+gc+'">'+eh(gl)+'</span>'
      +'<span class="ag-cnt">'+grpItems.length+' items</span></div>'
      +'<div class="ag-list">';
    grpItems.forEach(function(it){
      html+='<div class="ag-row" data-code="'+eh(it.code)+'" onclick="goSearch(this.dataset.code)">'
        +'<div class="ag-code">'+eh(it.code)+'</div>'
        +'<div class="ag-name">'+eh(it.desc)+'</div>'
        +'<span class="ag-price">'+fmt(it.excl)+'</span>'
        +'<span class="ag-arr">&#8250;</span>'
        +'</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('bycodeContent').innerHTML=html;
}

  var el=document.getElementById('favContent');

    el.innerHTML='<div class="fav-empty"><div class="fav-empty-icon">&#11088;</div><p>&#9734; 버튼을 탭하여<br>즐겨찾기에 추가하세요</p></div>';

function calcFavTotal(){
  var inp=document.getElementById('favDiscInput');
  var disc=parseFloat(inp?inp.value:0)||0;
  if(disc<-100)disc=-100; if(disc>100)disc=100;
  var totalIncl=0, totalExcl=0;
  favs.forEach(function(code){
    var it=ITEMS.find(function(x){return String(x.code)===String(code);});
    if(it){var qty=getFavQty(code);totalIncl+=it.incl*qty;totalExcl+=it.excl*qty;}
  });
  var exclEl=document.getElementById('favSubtotalExcl');
  var inclEl=document.getElementById('favSubtotalIncl');
  if(exclEl)exclEl.textContent=totalExcl.toLocaleString('ko-KR')+'원';
  if(inclEl)inclEl.textContent=totalIncl.toLocaleString('ko-KR')+'원';
  // service fee
  var svcChk=document.getElementById('favSvcChk');
  var svcHrsEl=document.getElementById('favSvcHrs');
  var svcAmtEl=document.getElementById('favSvcAmt');
  var svcChecked=svcChk?svcChk.checked:false;
  var svcHrs=parseFloat(svcHrsEl?svcHrsEl.value:1)||1;
  if(svcHrs<0)svcHrs=0;
  var svcExcl=svcChecked?Math.round(svcHrs*150000):0;
  var svcIncl=svcChecked?Math.round(svcExcl*1.1):0;
  // toggle hrs input enabled state
  if(svcHrsEl)svcHrsEl.disabled=!svcChecked;
  // update VAT breakdown display
  if(svcAmtEl){
    svcAmtEl.innerHTML=svcChecked
      ?'<span class="fav-svc-vat-excl">VAT별도 '+svcExcl.toLocaleString('ko-KR')+'원</span>'
       +'<span class="fav-svc-vat-incl">VAT포함 '+svcIncl.toLocaleString('ko-KR')+'원</span>'
      :'<span class="fav-svc-vat-excl">-</span>';
  }
  var savings=Math.round(totalIncl*(disc/100));
  var finalAmt=totalIncl+svcIncl-savings;
  var finalEl=document.getElementById('favFinalAmt');
  if(finalEl)finalEl.textContent=finalAmt.toLocaleString('ko-KR')+'원';
  // update savings/detail line
  var box=document.getElementById('favSummaryBox');
  if(box){
    var savEl=box.querySelector('.fav-final-savings');
    var detLines=[];
    if(svcChecked)detLines.push('서비스 요금 VAT포함 '+svcIncl.toLocaleString('ko-KR')+'원 ('+svcHrs+'hr)');
    if(savings>0)detLines.push('할인 -'+savings.toLocaleString('ko-KR')+'원 ('+disc+'%)');
    else if(savings<0)detLines.push('할증 +'+Math.abs(savings).toLocaleString('ko-KR')+'원 ('+Math.abs(disc)+'%)');
    if(detLines.length>0){
      if(!savEl){
        savEl=document.createElement('div');
        savEl.className='fav-final-savings';
        box.querySelector('.fav-final-row').after(savEl);
      }
      savEl.textContent=detLines.join(' · ');
    } else {
      if(savEl)savEl.remove();
    }
  }
}

function numToKorean(n){
  if(!n||n===0)return '영원 정';
  var U=['','일','이','삼','사','오','육','칠','팔','구'];
  var P4=['','만','억','조'];
  var P1=['','십','백','천'];
  var r='',bi=0,num=Math.abs(Math.round(n));
  while(num>0){
    var chunk=num%10000;
    if(chunk>0){
      var s='';
      for(var i=3;i>=0;i--){
        var d=Math.floor(chunk/Math.pow(10,i))%10;
        if(d>0)s+=(d===1&&i>0?'':U[d])+P1[i];
      }
      r=s+P4[bi]+r;
    }
    num=Math.floor(num/10000);
    bi++;
  }
  return r+'원 정';
}
